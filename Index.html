<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Readify Library</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container py-4">

    <h1 class="text-center mb-4">📚 Readify Library</h1>

    <!-- Search -->
    <input type="text" id="search" class="form-control mb-4" placeholder="Search books..." onkeyup="searchBook()">

    <div class="row">

        <!-- Book 1 -->
        <div class="col-md-4 mb-4 book" data-name="atomic habits">
            <div class="card p-3">
               <img src="book1.jpg" class="img-fluid">
                <h5>Atomic Habits</h5>
                <p>Self Improvement</p>

                <button class="btn btn-primary btn-sm"
                onclick="openBook('Atomic Habits','Build good habits and break bad ones.')">
                Read
                </button>

                <button class="btn btn-success btn-sm"
                onclick="addToRead('Atomic Habits')">
                Add to Read
                </button>

                <span class="like" onclick="likeBook(this)">❤️</span>
            </div>
        </div>

        <!-- Book 2 -->
        <div class="col-md-4 mb-4 book" data-name="rich dad poor dad">
            <div class="card p-3">
           <img src="book2.jpg" class="img-fluid">
                <h5>Rich Dad Poor Dad</h5>
                <p>Finance</p>

                <button class="btn btn-primary btn-sm"
                onclick="openBook('Rich Dad Poor Dad','Learn financial intelligence.')">
                Read
                </button>

                <button class="btn btn-success btn-sm"
                onclick="addToRead('Rich Dad Poor Dad')">
                Add to Read
                </button>

                <span class="like" onclick="likeBook(this)">❤️</span>
            </div>
        </div>

        <!-- Book 3 -->
        <div class="col-md-4 mb-4 book" data-name="the alchemist">
            <div class="card p-3">
                <img src="book3.jpg" class="img-fluid">
                <h5>The Alchemist</h5>
                <p>Fiction</p>

                <button class="btn btn-primary btn-sm"
                onclick="openBook('The Alchemist','A journey of dreams and destiny.')">
                Read
                </button>

                <button class="btn btn-success btn-sm"
                onclick="addToRead('The Alchemist')">
                Add to Read
                </button>

                <span class="like" onclick="likeBook(this)">❤️</span>
            </div>
        </div>

    </div>

    <!-- Read List -->
    <h3 class="mt-5">📖 My Read List</h3>
    <ul id="readList" class="list-group"></ul>

</div>

<!-- Modal -->
<div class="modal fade" id="bookModal">
  <div class="modal-dialog">
    <div class="modal-content bg-dark text-white p-3">
      <h4 id="modalTitle"></h4>
      <p id="modalDesc"></p>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js"></script>

</body>
</html>
